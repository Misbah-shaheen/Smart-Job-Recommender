name: smart_job_recommender
description: AI-powered job recommender app with ML backend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_auth_web: ^6.1.4

  # State management
  provider: ^6.1.2

  # HTTP / networking
  http: ^1.2.0

  # Local storage (remember login)
  shared_preferences: ^2.2.2

  # UI helpers
  flutter_staggered_animations: ^1.1.1
  percent_indicator: ^4.2.3
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/jobs.json
